# Tank Battalion - DOSBox Configuration
# Turbo Assembler 4.1 + Turbo Link 7.1 build environment

[sdl]
windowresolution=original
output=opengl
autolock=false

[render]
frameskip=0
aspect=false
scaler=normal2x

[cpu]
core=auto
cputype=auto
cycles=auto
cycleup=500
cycledown=500

[mixer]
nosound=true

[dos]
xms=false
ems=false
umb=false

[autoexec]
@echo off
mount c .
c:
path %PATH%;c:\tools\tasm\bin
cd src
echo.
echo ========================================
echo  TANK BATTALION - Build Environment
echo  TASM 4.1 / TLINK 7.1 / MAKE 4.0
echo ========================================
echo.
echo  To build:  build.bat
echo.
echo  Or manually:
echo    tasm main.asm, ..\build\main.obj
echo    tlink ..\build\main.obj, ..\build\main.exe, ..\build\main.map
echo.
echo  To debug:  td ..\build\main.exe
echo.
